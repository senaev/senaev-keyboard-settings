# Install https://github.com/espanso/espanso/releases
#
# In main config, add search shortcut (instead of default):
# search_shortcut:
#   SHIFT+META+V
#
# In match config (/Users/senaev/Library/Application Support/espanso/match/base.yml) add:
# imports:
#  - "/Users/senaev/projects/senaev-keyboard-settings/espanso/external-matches.yaml"

matches:
  - trigger: ":cc"
    replace: "✅"

  - trigger: ":pr" # Pointing Right
    replace: "👉"

  - trigger: ":xx"
    replace: "❌"

  - trigger: ":write"
    replace: "✍️"

  - trigger: ":red"
    replace: "🔴"

  - trigger: ":green"
    replace: "🟢"

  - trigger: ":blue"
    replace: "🔵"

  - trigger: ":root_folder"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "echo $(cd ~ && pwd)"
